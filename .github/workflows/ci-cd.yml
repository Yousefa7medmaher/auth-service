name: CI-CD for auth-service

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:

  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

 
  staging:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create envfile
        run: | 
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env 
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env 
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env 
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env 

          
      - name: Run docker compose
        run: docker compose up -d --build
 
      - name: Wait for app
        run: |
          for i in {1..6}; do
            if curl -s http://localhost:5000/health; then
              echo "App is ready"
              break
            fi
            sleep 5
          done
  
      - name: Health check
        run: curl -f http://localhost:5000/health
  
      - name: Readiness check
        run: curl -f http://localhost:5000/ready
  
      - name: Show logs (if failed)
        if: failure()
        run: docker compose logs
  
  prod:
    needs: [ci, staging]
    runs-on: ubuntu-latest
    environment: production 
    if: github.ref_name == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            yousef2005/auth-service:latest
            yousef2005/auth-service:${{ github.sha }}
            yousef2005/auth-service:v1.${{ github.run_number }}
          build-args: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGO_URI=${{ secrets.MONGO_URI }}
