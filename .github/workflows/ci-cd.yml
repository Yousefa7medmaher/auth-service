name: CI-CD for auth-service

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:

  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

 
  staging:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --name mongo
          -e MONGO_INITDB_ROOT_USERNAME=root
          -e MONGO_INITDB_ROOT_PASSWORD=example

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check app start
        run: node src/server.js & sleep 5
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGO_URI: mongodb://root:example@localhost:27017/stagingdb

      - name: Start app in background
        run: |
          export JWT_SECRET=${{ secrets.JWT_SECRET }}
          export MONGO_URI=mongodb://root:example@localhost:27017/stagingdb
          nohup npm run start &
          sleep 10

      - name: Test /health endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          if [ "$RESPONSE" -ne 200 ]; then
            echo " /health check failed"
            exit 1
          else
            echo " /health check passed"
          fi

      - name: Test /ready endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ready)
          if [ "$RESPONSE" -ne 200 ]; then
            echo " /ready check failed"
            exit 1
          else
            echo " /ready check passed"
          fi

  prod:
    needs: [ci, staging]
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            yousef2005/auth-service:latest
            yousef2005/auth-service:${{ github.sha }}
            yousef2005/auth-service:v1.${{ github.run_number }}
          build-args: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGO_URI=${{ secrets.MONGO_URI }}
