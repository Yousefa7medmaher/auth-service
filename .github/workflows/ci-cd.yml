name: CI-CD for auth-service 

on:
  push:
    branches: [main, nginx-conf]
  pull_request:
    branches: [main, nginx-conf]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install deps
        run: npm  install 

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        continue-on-error:  true

      - name: Build
        run: npm run build

  cd:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            yousef2005/auth-service:latest
            yousef2005/auth-service:${{ github.sha }}
            yousef2005/auth-service:v1.${{ github.run_number }}
